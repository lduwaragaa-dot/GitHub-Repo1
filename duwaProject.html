<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hayleys Webpage</title>
</head>
<body>
    <h1>Hayleys Webpage</h1>
    <h2>Send Us a Message</h2> 
    <p>If you were unable to find what you were looking for in our FAQs above, please fill<br> in the form below and we will respond to your message as soon as possible.</p>
    <form>
        <label for="fname">First Name:</label>
        <input type="text" id="fname" placeholder="Your first name here"/>

        <label for="lname">Last Name:</label>
        <input type="text" id="lname" placeholder="Your last name here"/>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Your email here"/>

        <br><br>

        <label for="phone">Phone:</label>
        <input type="number" id="phone" placeholder="Your contact no here"/>

        <label for="company">Company:</label>
        <input type="text" id="company" placeholder="Your comopany here"/>

        <label for="country">Country:</label>
        <input type="text" id="country" placeholder="Your country here"/>

        <br><br>

        <label>Are yoy satisfied with our services?</label>
        
        <br><br>

        <input type="radio" value="yes" id="yes" />
        <label>Yes</label>

        <br><br>

        <input type="radio" value="no" id="no" />
        <label>No</label>

        <br><br>

        <label>Subject</label>

        <br><br>

        <select>
            <option>I am looking for a job</option>
            <option>I am interested in supplying to Hayleys</option>
            <option>I want to know more about Hayleys</option>
        </select>

        <br><br>

        <textarea rows="10" cols="50" placeholder="Provide your feedback..."></textarea>

        <br><br>

        <input type="checkbox" value="agm" id="agm" />
        <label>Do you agree with our terms and conditions?</label>

        <br><br>

        <input type="checkbox" value="ser" id="ser" />
        <label>Do you think we have to make any changes to make Hayleys better?</label>

        <br><br>

        <div class="button">
            <button type="submit">Submit</button>
        </div>
        <p>Note: We will never share your information with any third party.</p>
    </form>
</body>
</html>
